<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker Pro | Cloud Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #08090a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff;
            --danger: #ff4b5c;
            --success: #00e676;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.07), transparent);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; transition: max-width 0.4s ease; }

        .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-weight: 600; font-size: 1.5rem; margin: 0; }

        .chart-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
            height: 220px;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }

        #days-container {
            display: grid;
            grid-template-columns: 1fr; /* Vertical para Smartphone */
            gap: 15px;
        }

        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-card label { color: #555; font-size: 0.6rem; text-transform: uppercase; }
        .stat-card .value { font-size: 1.1rem; font-weight: 600; margin-top: 5px; display: block; }

        /* Estilo de los bloques de cada día */
        .day-block {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .day-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--glass-border);
        }

        .day-info h2 { font-size: 1rem; margin: 0; }
        .day-info span { font-size: 0.75rem; color: #666; }

        .ticket-list { padding: 10px 20px; }
        .ticket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .ticket-item input {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: inherit;
            font-weight: 600;
            width: 80px;
            text-align: right;
            outline: none;
        }

        .btn-add-ticket {
            background: none;
            border: 1px dashed #333;
            color: #666;
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-delete-ticket {
            background: none;
            border: none;
            color: var(--danger);
            opacity: 0.5;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 5px;
        }
        .btn-delete-ticket:hover { opacity: 1; }

        .btn-reset {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Lighter border */
            color: rgba(255, 255, 255, 0.6); /* Lighter text */
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap; /* Prevent wrapping */
        }
        .btn-reset:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 75, 92, 0.1);
        }

        .btn-clear-day {
            background: none;
            border: 1px solid rgba(255, 75, 92, 0.3);
            color: var(--danger);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear-day:hover { background: rgba(255, 75, 92, 0.1); }

        .btn-add-ticket:hover { border-color: var(--accent); color: var(--accent); }

        .day-footer {
            padding: 10px 20px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .negative-bg { background: rgba(255, 75, 92, 0.05); border-color: rgba(255, 75, 92, 0.2); }
        .balance-val { font-weight: 600; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Expense App</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-reset" onclick="resetApp()">Reiniciar</button>
            <div id="global-total" class="balance-val" style="font-size: 1.2rem;">140.00€</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><label>Gastado</label><span id="total-spent" class="value">0.00€</span></div>
        <div class="stat-card"><label>Restante</label><span id="total-rem" class="value">140.00€</span></div>
        <div class="stat-card"><label>Estado</label><span id="global-status" class="value">OK</span></div>
    </div>

    <div class="chart-container">
        <canvas id="expenseChart"></canvas>
    </div>

    <div id="days-container"></div>
</div>

<script>
    const asignacionDiaria = 20;
    const fechas = ["28/03", "29/03", "30/03", "31/03", "01/04", "02/04", "03/04"];
    const presupuestoSemanal = asignacionDiaria * fechas.length;
    const nombresDias = ["Sábado", "Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
    let expenseChart;

    // Cargar datos: ahora es un array de arrays (tickets por día)
    let datosSemanales = JSON.parse(localStorage.getItem('misGastosTickets')) || [[],[],[],[],[],[],[]];

    function renderApp() {
        const container = document.getElementById('days-container');
        container.innerHTML = '';
        let saldoArrastrado = 0;
        let totalGastadoSemana = 0;
        const totalesDiarios = [];

        fechas.forEach((fecha, i) => {
            const tickets = datosSemanales[i];
            const gastoDia = tickets.reduce((a, b) => a + b, 0);
            totalesDiarios.push(gastoDia);
            totalGastadoSemana += gastoDia;

            const disponibleHoy = asignacionDiaria + saldoArrastrado;
            const balanceHoy = disponibleHoy - gastoDia;

            const block = document.createElement('div');
            block.className = `day-block ${balanceHoy < 0 ? 'negative-bg' : ''}`;
            
            block.innerHTML = `
                <div class="day-header">
                    <div class="day-info">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <h2>Día ${i+1} • ${nombresDias[i]}</h2>
                            <button class="btn-clear-day" onclick="clearDay(${i})">Limpiar</button>
                        </div>
                        <span>Disponible: ${disponibleHoy.toFixed(2)}€ (con arrastre)</span>
                    </div>
                    <div class="balance-val ${balanceHoy < 0 ? 'negative' : 'positive'}">
                        ${balanceHoy.toFixed(2)}€
                    </div>
                </div>
                <div class="ticket-list" id="list-${i}">
                    ${tickets.map((t, ti) => `
                        <div class="ticket-item">
                            <div>
                                <button class="btn-delete-ticket" onclick="deleteTicket(${i}, ${ti})">✕</button>
                                <span>Ticket #${ti+1}</span>
                            </div>
                            <input type="number" step="0.01" min="0" value="${t}" onchange="updateTicket(${i}, ${ti}, this.value)">
                        </div>
                    `).join('')}
                    <button class="btn-add-ticket" onclick="addTicket(${i})">+ Añadir Ticket</button>
                </div>
            `;
            
            container.appendChild(block);
            saldoArrastrado = balanceHoy;
        });

        // Totales globales
        document.getElementById('total-spent').innerText = totalGastadoSemana.toFixed(2) + "€";
        const restante = presupuestoSemanal - totalGastadoSemana;
        document.getElementById('total-rem').innerText = restante.toFixed(2) + "€";
        document.getElementById('global-total').innerText = restante.toFixed(2) + "€";
        document.getElementById('global-status').innerText = restante < 0 ? "Ouch!" : "Bien";
        document.getElementById('global-status').className = `value ${restante < 0 ? 'negative' : 'positive'}`;
        
        updateChart(totalesDiarios);
        localStorage.setItem('misGastosTickets', JSON.stringify(datosSemanales));
    }

    function resetApp() {
        if(confirm("¿Estás seguro de que quieres reiniciar toda la aplicación? Se borrarán todos los gastos y el historial.")) {
            localStorage.removeItem('misGastosTickets');
            datosSemanales = [[],[],[],[],[],[],[]]; // Reset to initial empty state
            renderApp();
        }
    }

    function updateChart(data) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        
        if (expenseChart) {
            expenseChart.data.datasets[0].data = data;
            // Color dinámico: rojo si supera la asignación diaria
            expenseChart.data.datasets[0].backgroundColor = data.map(v => v > asignacionDiaria ? 'rgba(255, 75, 92, 0.4)' : 'rgba(0, 210, 255, 0.2)');
            expenseChart.data.datasets[0].borderColor = data.map(v => v > asignacionDiaria ? '#ff4b5c' : '#00d2ff');
            expenseChart.update();
        } else {
            expenseChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: nombresDias,
                    datasets: [{
                        label: 'Gasto Diario',
                        data: data,
                        backgroundColor: data.map(v => v > asignacionDiaria ? 'rgba(255, 75, 92, 0.4)' : 'rgba(0, 210, 255, 0.2)'),
                        borderColor: data.map(v => v > asignacionDiaria ? '#ff4b5c' : '#00d2ff'),
                        borderWidth: 2,
                        borderRadius: 8,
                        hoverBackgroundColor: '#00d2ff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                            ticks: { color: '#666', font: { size: 10 } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#666', font: { size: 10 } }
                        }
                    }
                }
            });
        }
    }

    function addTicket(diaIdx) {
        datosSemanales[diaIdx].push(0);
        renderApp();
        
        // Auto-focus: selecciona el nuevo ticket para escribir rápido
        setTimeout(() => {
            const inputs = document.querySelectorAll(`#list-${diaIdx} .ticket-item input`);
            if(inputs.length > 0) inputs[inputs.length - 1].select();
        }, 50);
    }

    function clearDay(diaIdx) {
        if(confirm(`¿Borrar todos los gastos del ${nombresDias[diaIdx]}?`)) {
            datosSemanales[diaIdx] = [];
            renderApp();
        }
    }

    function deleteTicket(diaIdx, ticketIdx) {
        datosSemanales[diaIdx].splice(ticketIdx, 1);
        renderApp();
    }

    function updateTicket(diaIdx, ticketIdx, valor) {
        datosSemanales[diaIdx][ticketIdx] = parseFloat(valor) || 0;
        renderApp();
    }

    renderApp();
</script>

</body>
</html>
