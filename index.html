<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastro Tracker Pro | Food Expense</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #08090a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff;
            --danger: #ff4b5c;
            --success: #00e676;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.07), transparent);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 600px; }
        .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-weight: 600; font-size: 1.5rem; margin: 0; }
        .chart-container { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 25px; height: 220px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-card label { color: rgba(255,255,255,0.6); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .stat-card .value { font-size: 1.1rem; font-weight: 600; margin-top: 5px; display: block; }
        .day-block { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; overflow: hidden; margin-bottom: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .day-block:hover { transform: translateY(-3px); border-color: rgba(0, 210, 255, 0.3); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .day-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--glass-border); }
        .day-info h2 { font-size: 1rem; margin: 0; }
        .day-info span { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .ticket-list { padding: 10px 20px; }
        .ticket-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .category-picker { display: flex; gap: 8px; margin-right: 10px; }
        .cat-icon { cursor: pointer; opacity: 0.3; transition: 0.2s; font-size: 1rem; filter: grayscale(1); }
        .cat-icon.active { opacity: 1; filter: grayscale(0); transform: scale(1.2); }
        .ticket-item input { background: transparent; border: none; color: var(--accent); font-family: inherit; font-weight: 600; width: 70px; text-align: right; outline: none; border-bottom: 1px solid transparent; transition: border 0.2s; }
        .ticket-item input:focus { border-bottom-color: var(--accent); }
        .category-summary { display: flex; justify-content: space-around; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 12px; margin-bottom: 25px; }
        .cat-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .cat-stat label { font-size: 0.8rem; }
        .cat-stat span { font-size: 0.85rem; font-weight: 600; opacity: 0.9; }
        .btn-add-ticket { background: none; border: 1px dashed #333; color: #666; width: 100%; padding: 8px; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        .btn-delete-ticket { background: none; border: none; color: var(--danger); cursor: pointer; padding: 0 5px; opacity: 0.6; }
        .btn-delete-ticket:hover { opacity: 1; }
        .btn-reset { background: none; border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.6); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        .budget-input-container { display: flex; align-items: center; gap: 8px; background: var(--glass); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--glass-border); }
        .budget-input-container label { font-size: 0.7rem; color: rgba(255,255,255,0.5); }
        .budget-input-container input { background: transparent; border: none; color: var(--text); width: 40px; font-weight: 600; outline: none; }
        .balance-val { font-weight: 600; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        .negative-bg { background: rgba(255, 75, 92, 0.05); }
        .btn-link-sync { background: rgba(0, 210, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-link-sync:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Gastro Tracker</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div class="budget-input-container">
                <label>Dieta (€):</label>
                <input type="number" id="daily-budget" value="20" onchange="updateDailyBudget(this.value)">
            </div>
            <button class="btn-link-sync" onclick="generateSyncLink()">🔗 Sincronizar por Enlace</button>
            <button class="btn-reset" onclick="resetApp()">Reiniciar</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><label>Gastado</label><span id="total-spent" class="value">0.00€</span></div>
        <div class="stat-card"><label>Restante</label><span id="total-rem" class="value">0.00€</span></div>
        <div class="stat-card"><label>Balance</label><span id="global-total" class="value">0.00€</span></div>
    </div>

    <div class="category-summary" id="cat-summary">
        <div class="cat-stat"><label>🛒</label><span id="cat-sum-🛒">0€</span></div>
        <div class="cat-stat"><label>🍕</label><span id="cat-sum-🍕">0€</span></div>
        <div class="cat-stat"><label>🛵</label><span id="cat-sum-🛵">0€</span></div>
        <div class="cat-stat"><label>☕</label><span id="cat-sum-☕">0€</span></div>
    </div>

    <div class="chart-container"><canvas id="expenseChart"></canvas></div>
    <div id="days-container"></div>
</div>

<script>
    let dailyBudget = parseFloat(localStorage.getItem('dailyBudget')) || 20;
    document.getElementById('daily-budget').value = dailyBudget;

    // Generar fechas de la semana actual (Lunes a Domingo)
    function getWeekDates() {
        const now = new Date();
        // Ajustar para que la semana empiece el sábado (Sábado = 6)
        const offset = (now.getDay() + 1) % 7;
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - offset);
        
        return Array.from({length: 7}, (_, i) => {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            return d;
        });
    }

    const weekDates = getWeekDates();
    const weekLabels = weekDates.map(d => d.toLocaleDateString('es-ES', { weekday: 'long' }));
    const dateKeys = weekDates.map(d => d.toISOString().split('T')[0]); // Formato YYYY-MM-DD

    let expenseChart;
    // Estructura de datos: { "2024-03-25": [10, 5], ... }
    let datosSemanales = JSON.parse(localStorage.getItem('misGastosTicketsV2')) || {};

    function renderApp() {
        const container = document.getElementById('days-container');
        container.innerHTML = '';
        let saldoArrastrado = 0;
        let totalGastadoSemana = 0;
        const totalesDiarios = [];
        const presupuestoSemanal = dailyBudget * 7;
        const catTotals = { '🛒': 0, '🍕': 0, '🛵': 0, '☕': 0 };

        dateKeys.forEach((dateKey, i) => {
            const tickets = datosSemanales[dateKey] || [];
            const gastoDia = tickets.reduce((acc, t) => {
                catTotals[t.cat] += (t.val || 0);
                return acc + (t.val || 0);
            }, 0);
            totalesDiarios.push(gastoDia);
            totalGastadoSemana += gastoDia;

            const disponibleHoy = dailyBudget + saldoArrastrado;
            const balanceHoy = disponibleHoy - gastoDia;
            const labelFecha = weekDates[i].toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });

            const block = document.createElement('div');
            block.className = `day-block ${balanceHoy < 0 ? 'negative-bg' : ''}`;
            block.innerHTML = `
                <div class="day-header">
                    <div class="day-info">
                        <h2 style="text-transform: capitalize;">${weekLabels[i]} • ${labelFecha}</h2>
                        <span>Disponible: ${disponibleHoy.toFixed(2)}€</span>
                    </div>
                    <div class="balance-val ${balanceHoy < 0 ? 'negative' : 'positive'}">${balanceHoy.toFixed(2)}€</div>
                </div>
                <div class="ticket-list" id="list-${i}">
                    ${tickets.map((t, ti) => `
                        <div class="ticket-item">
                            <div style="display: flex; align-items: center;">
                                <button class="btn-delete-ticket" onclick="deleteTicket('${dateKey}', ${ti})">✕</button>
                                <div class="category-picker">
                                    <span class="cat-icon ${t.cat==='�'?'active':''}" onclick="updateCat('${dateKey}', ${ti}, '🛒')" title="Supermercado">🛒</span>
                                    <span class="cat-icon ${t.cat==='🍕'?'active':''}" onclick="updateCat('${dateKey}', ${ti}, '🍕')" title="Restaurante">🍕</span>
                                    <span class="cat-icon ${t.cat==='🛵'?'active':''}" onclick="updateCat('${dateKey}', ${ti}, '🛵')" title="Delivery">🛵</span>
                                    <span class="cat-icon ${t.cat==='☕'?'active':''}" onclick="updateCat('${dateKey}', ${ti}, '☕')" title="Café / Snacks">☕</span>
                                </div>
                            </div>
                            <input type="number" step="0.01" min="0" value="${t.val}" onchange="updateTicket('${dateKey}', ${ti}, this.value)" onkeyup="handleKeyUp(event, '${dateKey}')">
                        </div>
                    `).join('')}
                    <button class="btn-add-ticket" onclick="addTicket('${dateKey}')">+ Ticket</button>
                </div>
            `;
            container.appendChild(block);
            saldoArrastrado = balanceHoy;
        });

        const spentEl = document.getElementById('total-spent');
        const remEl = document.getElementById('total-rem');
        const globalEl = document.getElementById('global-total');
        const restante = presupuestoSemanal - totalGastadoSemana;

        spentEl.innerText = totalGastadoSemana.toFixed(2) + "€";
        remEl.innerText = restante.toFixed(2) + "€";
        remEl.className = `value ${restante < 0 ? 'negative' : 'positive'}`;
        globalEl.innerText = restante.toFixed(2) + "€";
        globalEl.className = `value ${restante < 0 ? 'negative' : 'positive'}`;

        // Actualizar resumen de categorías
        Object.keys(catTotals).forEach(cat => {
            document.getElementById(`cat-sum-${cat}`).innerText = catTotals[cat].toFixed(0) + "€";
        });

        updateChart(totalesDiarios);
        saveData();
    }

    function saveData() {
        localStorage.setItem('misGastosTicketsV2', JSON.stringify(datosSemanales));
        localStorage.setItem('dailyBudget', dailyBudget);
    }

    function updateDailyBudget(val) {
        dailyBudget = parseFloat(val) || 0;
        renderApp();
    }

    function addTicket(dateKey) {
        if (!datosSemanales[dateKey]) datosSemanales[dateKey] = [];
        datosSemanales[dateKey].push({val: 0, cat: '🛒'});
        renderApp();
        
        // Foco automático en el nuevo ticket
        const dayIdx = dateKeys.indexOf(dateKey);
        const inputs = document.querySelectorAll(`#list-${dayIdx} input`);
        if (inputs.length > 0) {
            const lastInput = inputs[inputs.length - 1];
            lastInput.focus();
            lastInput.select();
        }
    }

    function handleKeyUp(e, dateKey) {
        if (e.key === "Enter") {
            addTicket(dateKey);
        }
    }

    function deleteTicket(dateKey, tIdx) {
        if (datosSemanales[dateKey]) {
            datosSemanales[dateKey].splice(tIdx, 1);
            renderApp();
        }
    }

    function updateTicket(dateKey, tIdx, val) {
        const activeId = document.activeElement.parentElement?.parentElement?.parentElement?.id;
        const numVal = parseFloat(val) || 0;
        datosSemanales[dateKey][tIdx].val = Math.max(0, numVal);
        renderApp();
        // Mantener el foco si estábamos editando
        if (activeId) {
            const inputs = document.querySelectorAll(`#${activeId} input`);
            if (inputs[tIdx]) inputs[tIdx].focus();
        }
    }

    function updateCat(dateKey, tIdx, cat) {
        datosSemanales[dateKey][tIdx].cat = cat;
        renderApp();
    }

    function resetApp() {
        if(confirm("¿Estás seguro de que quieres reiniciar todos los datos?")) {
            datosSemanales = {};
            renderApp();
        }
    }

    function updateChart(data) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const colors = data.map(v => v > dailyBudget ? 'rgba(255, 75, 92, 0.4)' : 'rgba(0, 210, 255, 0.2)');
        const borders = data.map(v => v > dailyBudget ? '#ff4b5c' : '#00d2ff');

        if (expenseChart) {
            expenseChart.data.datasets[0].data = data;
            expenseChart.data.datasets[0].backgroundColor = colors;
            expenseChart.data.datasets[0].borderColor = borders;
            expenseChart.update();
        } else {
            expenseChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weekLabels.map(l => l.substring(0, 3)),
                    datasets: [{
                        label: 'Gasto Diario',
                        data: data,
                        backgroundColor: colors,
                        borderColor: borders,
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#666', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#666', font: { size: 10 } } }
                    }
                }
            });
        }
    }

    // --- SINCRONIZACIÓN POR URL (La forma más sencilla) ---
    function generateSyncLink() {
        try {
            const btn = document.querySelector('.btn-link-sync');
            const dataString = JSON.stringify(datosSemanales);
            const encodedData = btoa(encodeURIComponent(dataString));
            const syncUrl = window.location.origin + window.location.pathname + "#sync=" + encodedData;
            
            navigator.clipboard.writeText(syncUrl);
            const originalText = btn.innerText;
            btn.innerText = "✅ ¡Copiado!";
            btn.style.borderColor = "var(--success)";
            setTimeout(() => { btn.innerText = originalText; btn.style.borderColor = ""; }, 2000);
        } catch (e) {
            alert("Error al generar el enlace.");
        }
    }

    function checkUrlSync() {
        const hash = window.location.hash;
        if (hash.startsWith("#sync=")) {
            try {
                const encodedData = hash.replace("#sync=", "");
                const decodedData = JSON.parse(decodeURIComponent(atob(encodedData)));
                if (confirm("He detectado datos de otro dispositivo. ¿Quieres importarlos y sobrescribir tus datos actuales?")) {
                    datosSemanales = decodedData;
                    renderApp();
                    window.location.hash = ""; // Limpiar la URL
                }
            } catch (e) {
                console.error("Error en sincronización por URL", e);
            }
        }
    }

    // Migración inicial de datos (de formato simple a formato Gastro)
    Object.keys(datosSemanales).forEach(key => {
        datosSemanales[key] = datosSemanales[key].map(t => 
            typeof t === 'number' ? { val: t, cat: '🛒' } : t
        );
    });

    // Llamadas de inicialización para que aparezcan los datos al cargar la página
    checkUrlSync();
    renderApp();
</script>
</body>
</html>
